<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Flappy To Geometry Dash - TROLL EDITION</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #2c3e50; touch-action: none; font-family: 'Arial Black', sans-serif; transition: transform 0.2s ease; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui { position: absolute; top: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #score-text { color: white; font-size: 35px; text-shadow: 3px 3px 0 #000; margin-bottom: 5px; }
        #mode-text { color: #f1c40f; font-size: 18px; text-shadow: 2px 2px 0 #000; margin-bottom: 5px; font-weight: bold; }
        
        #boss-ui { width: 60%; max-width: 250px; background: #333; border: 3px solid #000; border-radius: 8px; overflow: hidden; display: none; }
        #boss-hp { width: 100%; height: 15px; background: #ff4757; transition: width 0.3s ease; }
        #boss-label { color: #ff4757; font-size: 12px; text-align: center; font-weight: bold; text-shadow: 1px 1px 0 #000; padding: 2px 0; }
        
        /* TROLL UYARI METNİ */
        #troll-alert { position: absolute; top: 80px; left: 20px; color: #ff00ff; font-size: 14px; text-shadow: 1px 1px 0 #000; font-weight: bold; display: none; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="mode-text">FLAPPY MODU</div>
        <div id="score-text">0</div>
        <div id="boss-ui">
            <div id="boss-label">CANAVAR HP</div>
            <div id="boss-hp"></div>
        </div>
    </div>

    <div id="troll-alert">SİSTEM: BAŞARIYLA TROLLENDİNİZ!</div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("score-text");
        const modeText = document.getElementById("mode-text");
        const bossUi = document.getElementById("boss-ui");
        const bossHpBar = document.getElementById("boss-hp");
        const trollAlert = document.getElementById("troll-alert");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false;
        }
        window.addEventListener('resize', resize);
        resize();

        let gameMode = "FLAPPY"; 
        let score = 0, gameOver = false, gameStarted = false, frameCount = 0;
        let flashEffect = 0, screenShake = 0;
        let bgPulseColor = "#0f0212"; 

        // Troll Durum Değişkenleri
        let isUpsideDown = false; // Ekran ters mi?
        let blackoutTimer = 0; // Elektrik kesintisi sayacı
        let globalGravitySign = 1; // 1: Düz yerçekimi, -1: Ters yerçekimi

        let bird = { 
            x: canvas.width * 0.3, y: canvas.height / 2, w: 34, h: 24, 
            gravity: 0.4, velocity: 0, jump: -7.5, wingFrame: 0, rotation: 0, 
            dashSize: 32, dashGravity: 0.95, dashJump: -14.5 
        };

        let monster = { x: -10, y: canvas.height / 2 - 50, w: 70, h: 90, maxHp: 3, hp: 3, shake: 0 };

        let pipes = [];
        let spikes = [];
        let rockets = [];
        let pipeWidth = 60, pipeGap = 150, pipeSpeed = 2.5, groundHeight = 120;
        
        // ÇILGIN HIZ: 14.5
        let spikeSpeed = 14.5; 

        const doJump = () => {
            if (!gameStarted) { 
                gameStarted = true; 
                if(gameMode === "FLAPPY") bossUi.style.display = "block"; 
            }
            if (gameOver) { resetGame(); return; }

            // %10 Şansla zıplama trollü (Zıplamayı iptal eder/geciktirir)
            if (gameMode === "DASH" && Math.random() < 0.10) {
                trollAlert.style.display = "block";
                trollAlert.textContent = "KLAVYE/DOKUNMATİK BOZULDU!";
                setTimeout(() => trollAlert.style.display = "none", 800);
                return; 
            }

            if (gameMode === "FLAPPY") {
                bird.velocity = bird.jump;
            } else if (gameMode === "DASH") {
                if (globalGravitySign === 1) { // Düz modda tabanda zıplama
                    if (bird.y >= canvas.height - groundHeight - bird.dashSize) bird.velocity = bird.dashJump; 
                } else { // Ters modda tavanda zıplama
                    if (bird.y <= groundHeight) bird.velocity = -bird.dashJump; 
                }
            }
        };

        window.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); }, { passive: false });
        window.addEventListener('mousedown', doJump);

        function createPipe() {
            let minH = 60, maxH = canvas.height - groundHeight - pipeGap - 60;
            let topH = Math.floor(Math.random() * (maxH - minH + 1) + minH);
            pipes.push({ x: canvas.width, topHeight: topH, bottomY: topH + pipeGap, passed: false });
        }

        function createSpike() {
            let count = Math.random() < 0.5 ? 1 : (Math.random() < 0.75 ? 2 : 3);
            
            // TROLL DURUMU: Çivi sahte mi yoksa görünmez mi?
            let rand = Math.random();
            let trollType = "NONE";
            if (rand < 0.20) trollType = "FAKE"; // Yaklaşınca yok olacak çivi
            else if (rand >= 0.20 && rand < 0.35) trollType = "INVISIBLE"; // Yaklaşınca belirecek çivi

            spikes.push({ 
                x: canvas.width, w: 26, h: 32, count: count, 
                troll: trollType, isVisible: (trollType !== "INVISIBLE"), passed: false 
            });
        }

        function createRocket() {
            let minRocketY = groundHeight + 50;
            let maxRocketY = canvas.height - groundHeight - 50;
            let rocketY = Math.floor(Math.random() * (maxRocketY - minRocketY + 1) + minRocketY);
            rockets.push({ x: canvas.width + 100, y: rocketY, w: 40, h: 14, speed: spikeSpeed * 1.2, passed: false });
        }

        function resetGame() {
            gameMode = "FLAPPY";
            bgPulseColor = "#0f0212";
            modeText.textContent = "FLAPPY MODU";
            modeText.style.color = "#f1c40f";
            document.body.style.transform = "none";
            isUpsideDown = false; globalGravitySign = 1; blackoutTimer = 0;
            bird.y = canvas.height / 2; bird.velocity = 0; bird.rotation = 0;
            monster.hp = monster.maxHp; bossHpBar.style.width = "100%";
            pipes = []; spikes = []; rockets = []; score = 0; scoreText.textContent = score;
            gameOver = false; gameStarted = false; frameCount = 0; flashEffect = 0; screenShake = 0;
            bossUi.style.display = "none"; trollAlert.style.display = "none";
        }

        function update() {
            frameCount++;

            if (gameStarted && !gameOver) {
                // Yerçekimi yönü
                if (gameMode === "DASH") {
                    bird.velocity += bird.dashGravity * globalGravitySign;
                } else {
                    bird.velocity += bird.gravity;
                }
                bird.y += bird.velocity;

                if (gameMode === "FLAPPY") {
                    if (bird.velocity < 0) bird.rotation = -0.3;
                    else if (bird.velocity > 3) { bird.rotation += 0.05; if (bird.rotation > 1.2) bird.rotation = 1.2; }

                    if (frameCount % 5 === 0) bird.wingFrame = (bird.wingFrame + 1) % 3;
                    if (frameCount % 90 === 0) createPipe();

                    monster.y += (bird.y - 30 - monster.y) * 0.05;
                    if(monster.shake > 0) monster.shake--;

                    pipes.forEach((pipe, idx) => {
                        pipe.x -= pipeSpeed;
                        if (bird.x + bird.w - 4 > pipe.x && bird.x + 4 < pipe.x + pipeWidth) {
                            if (bird.y + 4 < pipe.topHeight || bird.y + bird.h - 4 > pipe.bottomY) gameOver = true;
                        }

                        if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
                            pipe.passed = true;
                            score++; scoreText.textContent = score;
                            
                            if (score % 3 === 0 && monster.hp > 0) {
                                monster.hp--; monster.shake = 20; flashEffect = 12;
                                bossHpBar.style.width = (monster.hp / monster.maxHp) * 100 + "%";

                                if (monster.hp <= 0) {
                                    setTimeout(() => {
                                        gameMode = "DASH";
                                        modeText.textContent = "GEOMETRY DASH (TROLL)";
                                        modeText.style.color = "#ff00ff";
                                        bossUi.style.display = "none";
                                        pipes = []; 
                                        bird.y = canvas.height - groundHeight - bird.dashSize;
                                        bird.velocity = 0;
                                    }, 200);
                                }
                            }
                        }
                        if (pipe.x + pipeWidth < 0) pipes.splice(idx, 1);
                    });

                    if (bird.y + bird.h >= canvas.height - groundHeight || bird.y < 0) gameOver = true;

                } else if (gameMode === "DASH") {
                    // TROLL GEOMETRY DASH KONTROLLERİ

                    // Yer Sınırları (Düz veya Ters olmasına göre zemin kilitleri)
                    if (globalGravitySign === 1) { // Düz zemin kontrolü
                        if (bird.y >= canvas.height - groundHeight - bird.dashSize) {
                            bird.y = canvas.height - groundHeight - bird.dashSize; bird.velocity = 0; bird.rotation = 0;
                        } else { bird.rotation += 0.18; }
                    } else { // Ters zemin kontrolü (Tavan)
                        if (bird.y <= groundHeight) {
                            bird.y = groundHeight; bird.velocity = 0; bird.rotation = 0;
                        } else { bird.rotation -= 0.18; }
                    }

                    // Dinamik Zorluk Döngüleri
                    if (frameCount % 45 === 0) createSpike();
                    if (frameCount % 100 === 0) createRocket();

                    // TROLL: Rastgele Elektrik Kesintisi (Karartma)
                    if (frameCount % 300 === 0 && Math.random() < 0.5) {
                        blackoutTimer = 45; // 45 kare ekran kararacak
                        trollAlert.style.display = "block";
                        trollAlert.textContent = "SİSTEM: ELEKTRİKLER KESİLDİ!";
                        setTimeout(() => trollAlert.style.display = "none", 1000);
                    }
                    if (blackoutTimer > 0) blackoutTimer--;

                    // Çivi Güncelleme ve Troll Tetiklemeleri
                    spikes.forEach((spike, idx) => {
                        spike.x -= spikeSpeed;
                        let totalSpikeWidth = spike.w * spike.count;

                        // TROLL tetikleme mesafesi (Çivi tam oyuncuya yaklaşırken)
                        let distance = spike.x - bird.x;
                        if (distance > 50 && distance < 180) {
                            if (spike.troll === "FAKE") {
                                spike.w = 0; spike.count = 0; // Çivi aniden sihirli bir şekilde yok olur!
                            }
                            if (spike.troll === "INVISIBLE") {
                                spike.isVisible = true; // Görünmez çivi aniden önünde belirir!
                            }
                        }

                        // Çarpışma Testi (Eğer görünürse kaza yapar)
                        if (spike.isVisible && bird.x + bird.dashSize > spike.x + 4 && bird.x < spike.x + totalSpikeWidth - 4) {
                            // Çivinin nerede durduğu (Ters veya düz mod) kontrolü
                            let spikeY = isUpsideDown ? groundHeight + spike.h : canvas.height - groundHeight - spike.h;
                            
                            if (!isUpsideDown && bird.y + bird.dashSize > canvas.height - groundHeight - spike.h) gameOver = true;
                            if (isUpsideDown && bird.y < groundHeight + spike.h) gameOver = true;
                        }

                        if (!pipe.passed && spike.x + totalSpikeWidth < bird.x) {
                            spike.passed = true; score++; scoreText.textContent = score;
                            screenShake = 6;

                            // TROLL: Her 4 puan geçişinde ekranı ters çevir!
                            if (score % 4 === 0) {
                                isUpsideDown = !isUpsideDown;
                                globalGravitySign = isUpsideDown ? -1 : 1;
                                document.body.style.transform = isUpsideDown ? "rotate(180deg)" : "none";
                                bird.velocity = 0;
                                trollAlert.style.display = "block";
                                trollAlert.textContent = "YERÇEKİMİ TERSİNE DÖNDÜ!";
                                setTimeout(() => trollAlert.style.display = "none", 1200);
                            }
                        }
                        if (spike.x + totalSpikeWidth < 0) spikes.splice(idx, 1);
                    });

                    // Roket Güncellemeleri
                    rockets.forEach((rocket, idx) => {
                        rocket.x -= rocket.speed;
                        if (bird.x + bird.dashSize > rocket.x + 2 && bird.x < rocket.x + rocket.w - 2 &&
                            bird.y + bird.dashSize > rocket.y + 2 && bird.y < rocket.y + rocket.h - 2) {
                            gameOver = true;
                        }
                        if (!rocket.passed && rocket.x + rocket.w < bird.x) {
                            rocket.passed = true; score += 2; scoreText.textContent = score;
                        }
                        if (rocket.x + rocket.w < 0) rockets.splice(idx, 1);
                    });
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            // Elektrik kesintisi aktifse ekran tamamen simsiyah olur
            if (blackoutTimer > 0) {
                ctx.fillStyle = "#000000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                return;
            }

            ctx.fillStyle = (gameMode === "DASH") ? bgPulseColor : "#2c3e50";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameMode === "FLAPPY") {
                pipes.forEach(pipe => {
                    ctx.fillStyle = "#27ae60"; ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                    ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);
                });

                if (monster.hp > 0) {
                    ctx.save();
                    if (monster.shake > 0) ctx.translate((Math.random() - 0.5) * 10, 0);
                    ctx.fillStyle = monster.shake > 0 ? "#ff4757" : "#1e1e24";
                    ctx.fillRect(monster.x, monster.y, monster.w, monster.h);
                    ctx.fillStyle = "#ff0000"; ctx.fillRect(monster.x + monster.w - 20, monster.y + 20, 8, 8);
                    ctx.restore();
                }

                ctx.save(); ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2); ctx.rotate(bird.rotation);
                ctx.fillStyle = "#F7D51D"; ctx.fillRect(-bird.w/2, -bird.h/2, bird.w, bird.h);
                ctx.fillStyle = "#FFF"; ctx.fillRect(4, -8, 8, 8); ctx.fillStyle = "#F75300"; ctx.fillRect(6, 2, 8, 6);
                ctx.restore();

            } else if (gameMode === "DASH") {
                // ÇİVİLERİ ÇİZ (Ekran tersse tavana çizilir)
                spikes.forEach(spike => {
                    if (!spike.isVisible) return; // Görünmez çiviyse çizilmez

                    ctx.fillStyle = (spike.troll !== "NONE") ? "#ff00ff" : "#ff3344"; // Troll çiviler mor yanar
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
                    
                    for (let s = 0; s < spike.count; s++) {
                        let currentSpikeX = spike.x + (s * spike.w);
                        
                        ctx.beginPath();
                        if (!isUpsideDown) { // Düz Çivi
                            ctx.moveTo(currentSpikeX, canvas.height - groundHeight);
                            ctx.lineTo(currentSpikeX + spike.w / 2, canvas.height - groundHeight - spike.h);
                            ctx.lineTo(currentSpikeX + spike.w, canvas.height - groundHeight);
                        } else { // Ters Çivi (Tavandan sarkan)
                            ctx.moveTo(currentSpikeX, groundHeight);
                            ctx.lineTo(currentSpikeX + spike.w / 2, groundHeight + spike.h);
                            ctx.lineTo(currentSpikeX + spike.w, groundHeight);
                        }
                        ctx.closePath(); ctx.fill(); ctx.stroke();
                    }
                });

                // ROKETLERİ ÇİZ
                rockets.forEach(rocket => {
                    ctx.fillStyle = "#00ffff"; ctx.fillRect(rocket.x, rocket.y, rocket.w, rocket.h);
                    ctx.fillStyle = "#ff0055"; ctx.fillRect(rocket.x, rocket.y + 3, 8, rocket.h - 6);
                });

                // ÖFKELİ TROLL KÜPÜ
                ctx.save(); ctx.translate(bird.x + bird.dashSize/2, bird.y + bird.dashSize/2); ctx.rotate(bird.rotation);
                ctx.fillStyle = "#ff00ff"; // Troll Pembesi
                ctx.fillRect(-bird.dashSize/2, -bird.dashSize/2, bird.dashSize, bird.dashSize);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.strokeRect(-bird.dashSize/2, -bird.dashSize/2, bird.dashSize, bird.dashSize);
                // Troll surat ifadesi pikselleri
                ctx.fillStyle = "#000"; ctx.fillRect(-8, -6, 4, 4); ctx.fillRect(4, -6, 4, 4);
                ctx.fillRect(-6, 4, 12, 3); // Düz sırıtma
                ctx.restore();
            }

            // ÇİFT YÖNLÜ ZEMİN (Hem alta hem üste çiziyoruz çünkü ekran ters dönecek!)
            ctx.fillStyle = (gameMode === "DASH") ? "#09020d" : "#7f8c8d";
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight); // Alt zemin
            ctx.fillRect(0, 0, canvas.width, groundHeight); // Üst tavan zemini

            ctx.fillStyle = (gameMode === "DASH") ? "#ff00ff" : "#95a5a6"; 
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 8); 
            ctx.fillRect(0, groundHeight - 8, canvas.width, 8); 

            if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.95)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff00ff"; ctx.font = "30px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("GEÇMİŞ OLSUN, TROLLENDİN!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "white"; ctx.font = "18px sans-serif";
                ctx.fillText("Akıl sağlığını tekrar kaybetmek için dokun", canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        update();
    </script>
</body>
</html>
