<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Flappy To Geometry Dash - Demon Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #2c3e50; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui { position: absolute; top: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        #score-text { color: white; font-size: 35px; text-shadow: 3px 3px 0 #000; margin-bottom: 5px; }
        #mode-text { color: #f1c40f; font-size: 18px; text-shadow: 2px 2px 0 #000; margin-bottom: 5px; font-weight: bold; }
        
        #boss-ui { width: 60%; max-width: 250px; background: #333; border: 3px solid #000; border-radius: 8px; overflow: hidden; display: none; }
        #boss-hp { width: 100%; height: 15px; background: #ff4757; transition: width 0.3s ease; }
        #boss-label { color: #ff4757; font-size: 12px; text-align: center; font-weight: bold; text-shadow: 1px 1px 0 #000; padding: 2px 0; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="mode-text">FLAPPY MODU</div>
        <div id="score-text">0</div>
        <div id="boss-ui">
            <div id="boss-label">CANAVAR HP</div>
            <div id="boss-hp"></div>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("score-text");
        const modeText = document.getElementById("mode-text");
        const bossUi = document.getElementById("boss-ui");
        const bossHpBar = document.getElementById("boss-hp");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false;
        }
        window.addEventListener('resize', resize);
        resize();

        let gameMode = "FLAPPY"; 
        let score = 0, gameOver = false, gameStarted = false, frameCount = 0;
        let flashEffect = 0;
        let bgPulseColor = "#181a26"; // Dash modu dinamik arka planı

        // Karakter Ayarları (Dash modu yerçekimi ve zıplaması sertleştirildi)
        let bird = { 
            x: canvas.width * 0.35, y: canvas.height / 2, w: 34, h: 24, 
            gravity: 0.4, velocity: 0, jump: -7.5, wingFrame: 0, rotation: 0, 
            dashSize: 34, dashGravity: 0.8, dashJump: -13.5 
        };

        // Canavar (3 Vuruşta ölüyor)
        let monster = { x: -10, y: canvas.height / 2 - 50, w: 70, h: 90, maxHp: 3, hp: 3, shake: 0 };

        // Engeller
        let pipes = [];
        let spikes = [];
        let pipeWidth = 60, pipeGap = 150, pipeSpeed = 2.5, groundHeight = 120;
        
        // ZORLAŞTIRILMIŞ HIZ
        let spikeSpeed = 8.5; 

        const doJump = () => {
            if (!gameStarted) { 
                gameStarted = true; 
                if(gameMode === "FLAPPY") bossUi.style.display = "block"; 
            }
            if (gameOver) { resetGame(); return; }

            if (gameMode === "FLAPPY") {
                bird.velocity = bird.jump;
            } else if (gameMode === "DASH") {
                // Sadece yerdeyken zıplama
                if (bird.y >= canvas.height - groundHeight - bird.dashSize) {
                    bird.velocity = bird.dashJump; 
                }
            }
        };

        window.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); }, { passive: false });
        window.addEventListener('mousedown', doJump);

        function createPipe() {
            let minH = 60, maxH = canvas.height - groundHeight - pipeGap - 60;
            let topH = Math.floor(Math.random() * (maxH - minH + 1) + minH);
            pipes.push({ x: canvas.width, topHeight: topH, bottomY: topH + pipeGap, passed: false });
        }

        // ZORLAŞTIRILMIŞ ÇİVİ ÜRETİCİSİ (Tekli, İkili veya Üçlü çiviler)
        function createSpike() {
            let type = Math.random();
            let count = 1; // Tekli çivi %40 ihtimal
            if (type > 0.4 && type <= 0.75) count = 2; // İkili çivi %35 ihtimal
            if (type > 0.75) count = 3; // Üçlü ölümcül çivi %25 ihtimal

            spikes.push({ x: canvas.width, w: 26, h: 32, count: count, passed: false });
        }

        function resetGame() {
            gameMode = "FLAPPY";
            bgPulseColor = "#181a26";
            modeText.textContent = "FLAPPY MODU";
            modeText.style.color = "#f1c40f";
            bird.y = canvas.height / 2; bird.velocity = 0; bird.rotation = 0;
            monster.hp = monster.maxHp; bossHpBar.style.width = "100%";
            pipes = []; spikes = []; score = 0; scoreText.textContent = score;
            gameOver = false; gameStarted = false; frameCount = 0; flashEffect = 0;
            bossUi.style.display = "none";
        }

        function update() {
            frameCount++;

            if (gameStarted && !gameOver) {
                // Modlara özel yerçekimi
                bird.velocity += (gameMode === "DASH" ? bird.dashGravity : bird.gravity); 
                bird.y += bird.velocity;

                if (gameMode === "FLAPPY") {
                    if (bird.velocity < 0) bird.rotation = -0.3;
                    else if (bird.velocity > 3) { bird.rotation += 0.05; if (bird.rotation > 1.2) bird.rotation = 1.2; }

                    if (frameCount % 5 === 0) bird.wingFrame = (bird.wingFrame + 1) % 3;
                    if (frameCount % 90 === 0) createPipe();

                    monster.y += (bird.y - 30 - monster.y) * 0.05;
                    if(monster.shake > 0) monster.shake--;

                    pipes.forEach((pipe, idx) => {
                        pipe.x -= pipeSpeed;
                        if (bird.x + bird.w - 4 > pipe.x && bird.x + 4 < pipe.x + pipeWidth) {
                            if (bird.y + 4 < pipe.topHeight || bird.y + bird.h - 4 > pipe.bottomY) gameOver = true;
                        }

                        if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
                            pipe.passed = true;
                            score++;
                            scoreText.textContent = score;
                            
                            if (score % 3 === 0 && monster.hp > 0) {
                                monster.hp--;
                                monster.shake = 20;
                                flashEffect = 12;
                                bossHpBar.style.width = (monster.hp / monster.maxHp) * 100 + "%";

                                if (monster.hp <= 0) {
                                    setTimeout(() => {
                                        gameMode = "DASH";
                                        modeText.textContent = "GEOMETRY DASH (DEMON)";
                                        modeText.style.color = "#ff3333";
                                        bossUi.style.display = "none";
                                        pipes = []; 
                                        bird.y = canvas.height - groundHeight - bird.dashSize;
                                        bird.velocity = 0;
                                    }, 200);
                                }
                            }
                        }
                        if (pipe.x + pipeWidth < 0) pipes.splice(idx, 1);
                    });

                    if (bird.y + bird.h >= canvas.height - groundHeight || bird.y < 0) gameOver = true;

                } else if (gameMode === "DASH") {
                    // GEOMETRY DASH MODU (ZOR)
                    if (bird.y >= canvas.height - groundHeight - bird.dashSize) {
                        bird.y = canvas.height - groundHeight - bird.dashSize;
                        bird.velocity = 0;
                        bird.rotation = 0;
                    } else {
                        bird.rotation += 0.12; // Havada daha hızlı döner
                    }

                    // Çivi gelme sıklığı hıza göre ayarlandı
                    if (frameCount % 65 === 0) createSpike();

                    spikes.forEach((spike, idx) => {
                        spike.x -= spikeSpeed;

                        // Genişletilmiş Çarpışma Alanı (Küpün çivinin toplam genişliğine çarpma hesabı)
                        let totalSpikeWidth = spike.w * spike.count;
                        if (bird.x + bird.dashSize > spike.x + 4 && bird.x < spike.x + totalSpikeWidth - 4 &&
                            bird.y + bird.dashSize > canvas.height - groundHeight - spike.h) {
                            gameOver = true;
                        }

                        if (!spike.passed && spike.x + totalSpikeWidth < bird.x) {
                            spike.passed = true;
                            score++;
                            scoreText.textContent = score;
                            
                            // Başarılı atlamalarda arka plan rengi parlasın (Ritim efekti)
                            let colors = ["#2c1a3a", "#1a3a3a", "#3a1a1a", "#181a26"];
                            bgPulseColor = colors[Math.floor(Math.random() * colors.length)];
                        }
                        if (spike.x + totalSpikeWidth < 0) spikes.splice(idx, 1);
                    });
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = (gameMode === "DASH") ? bgPulseColor : "#2c3e50";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameMode === "FLAPPY") {
                pipes.forEach(pipe => {
                    ctx.fillStyle = "#27ae60"; ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                    ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);
                });

                if (monster.hp > 0) {
                    ctx.save();
                    if (monster.shake > 0) ctx.translate((Math.random() - 0.5) * 10, 0);
                    ctx.fillStyle = monster.shake > 0 ? "#ff4757" : "#1e1e24";
                    ctx.fillRect(monster.x, monster.y, monster.w, monster.h);
                    ctx.fillStyle = "#ff0000"; ctx.fillRect(monster.x + monster.w - 20, monster.y + 20, 8, 8);
                    ctx.restore();
                }

                ctx.save();
                ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
                ctx.rotate(bird.rotation);
                ctx.fillStyle = "#F7D51D"; ctx.fillRect(-bird.w/2, -bird.h/2, bird.w, bird.h);
                ctx.fillStyle = "#FFF"; ctx.fillRect(4, -8, 8, 8);
                ctx.fillStyle = "#F75300"; ctx.fillRect(6, 2, 8, 6);
                ctx.restore();

            } else if (gameMode === "DASH") {
                // GEOMETRY DASH ÇİVİLERİ (Çoklu Çizim Sistemi)
                spikes.forEach(spike => {
                    ctx.fillStyle = "#ff4757";
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;

                    for (let s = 0; s < spike.count; s++) {
                        let currentSpikeX = spike.x + (s * spike.w);
                        ctx.beginPath();
                        ctx.moveTo(currentSpikeX, canvas.height - groundHeight);
                        ctx.lineTo(currentSpikeX + spike.w / 2, canvas.height - groundHeight - spike.h);
                        ctx.lineTo(currentSpikeX + spike.w, canvas.height - groundHeight);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    }
                });

                // LAVA DETAYLI KÜP
                ctx.save();
                ctx.translate(bird.x + bird.dashSize/2, bird.y + bird.dashSize/2);
                ctx.rotate(bird.rotation);
                ctx.fillStyle = "#ff3333"; 
                ctx.fillRect(-bird.dashSize/2, -bird.dashSize/2, bird.dashSize, bird.dashSize);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
                ctx.strokeRect(-bird.dashSize/2, -bird.dashSize/2, bird.dashSize, bird.dashSize);
                
                // Agresif İkon Yüzü
                ctx.fillStyle = "#000";
                ctx.fillRect(-8, -9, 5, 8); ctx.fillRect(3, -9, 5, 8);
                ctx.beginPath(); ctx.moveTo(-8, 5); ctx.lineTo(8, 5); ctx.lineTo(0, 1); ctx.closePath(); ctx.fill();
                ctx.restore();
            }

            // Zemin Tasarımı
            ctx.fillStyle = (gameMode === "DASH") ? "#0d0e15" : "#7f8c8d";
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            ctx.fillStyle = (gameMode === "DASH") ? "#ff3333" : "#95a5a6"; 
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 8); 

            if (flashEffect > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${flashEffect / 12})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                flashEffect--;
            }

            if (!gameStarted) {
                ctx.fillStyle = "white"; ctx.font = "20px Arial"; ctx.textAlign = "center";
                ctx.fillText("MİLY DEMON LEVEL'A BAŞLA", canvas.width / 2, canvas.height / 2 + 100);
            }

            if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff3333"; ctx.font = "35px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("ELENDİN! (DEMON)", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "white"; ctx.font = "18px sans-serif";
                ctx.fillText("Tekrar denemek için ekrana dokun", canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        update();
    </script>
</body>
</html>
