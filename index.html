<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mily Flappy Bird</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #4ec0ca; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #score-ui {
            position: absolute; top: 30px; width: 100%; text-align: center;
            color: white; font-size: 45px; font-weight: bold;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="score-ui">0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreUi = document.getElementById("score-ui");

        // Ekran boyutunu ayarla
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Piksel sanatının net görünmesi için yumuşatmayı kapatıyoruz
            ctx.imageSmoothingEnabled = false;
        }
        window.addEventListener('resize', resize);
        resize();

        // OYUN DEĞİŞKENLERİ
        let score = 0;
        let gameOver = false;
        let gameStarted = false;
        let frameCount = 0;

        // KUŞUN FİZİKLERİ VE PİKSEL TASARIMI
        let bird = {
            x: canvas.width * 0.25,
            y: canvas.height / 2,
            w: 34, // Orijinal Flappy boyutu oranları
            h: 24,
            gravity: 0.4,
            velocity: 0,
            jump: -7.5,
            wingFrame: 0, // 0: Kanat yukarıda, 1: Ortada, 2: Aşağıda
            rotation: 0
        };

        // BORU AYARLARI
        let pipes = [];
        let pipeWidth = 60;
        let pipeGap = 140; // Geçiş boşluğu (Mobilde rahat oynamak için dengelendi)
        let pipeSpeed = 2.5;

        // ZEMİN AYARI
        let groundHeight = 80;

        // DOKUNMATİK EKRAN TETİKLEYİCİSİ (ZIPLAMA)
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameStarted) {
                gameStarted = true;
            }
            if (gameOver) {
                resetGame();
                return;
            }
            bird.velocity = bird.jump;
        }, { passive: false });

        // Tıklama desteği (Test için)
        window.addEventListener('mousedown', () => {
            if (!gameStarted) gameStarted = true;
            if (gameOver) { resetGame(); return; }
            bird.velocity = bird.jump;
        });

        function createPipe() {
            let minHeight = 50;
            let maxHeight = canvas.height - groundHeight - pipeGap - 50;
            let topPipeHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
            
            pipes.push({
                x: canvas.width,
                topHeight: topPipeHeight,
                bottomY: topPipeHeight + pipeGap,
                passed: false
            });
        }

        function resetGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes = [];
            score = 0;
            scoreUi.textContent = score;
            gameOver = false;
            gameStarted = false;
            frameCount = 0;
        }

        function update() {
            frameCount++;

            if (gameStarted && !gameOver) {
                // Fizik kuralları
                bird.velocity += bird.gravity;
                bird.y += bird.velocity;

                // Kuşun burnunun aşağı/yukarı dönme efekti
                if (bird.velocity < 0) {
                    bird.rotation = -0.3; // Yukarı bakış
                } else if (bird.velocity > 3) {
                    bird.rotation += 0.05; // Aşağı süzülüş
                    if (bird.rotation > 1.2) bird.rotation = 1.2;
                }

                // Kanat Çırpış Hızı (Her 5 karede bir kanat açısını değiştir)
                if (frameCount % 5 === 0) {
                    bird.wingFrame = (bird.wingFrame + 1) % 3;
                }

                // Boruların Hareketi ve Üretimi
                if (frameCount % 100 === 0) {
                    createPipe();
                }

                pipes.forEach((pipe, idx) => {
                    pipe.x -= pipeSpeed;

                    // TAM HİTBOX (PİKSEL ÇARPIŞMASI)
                    if (bird.x + bird.w - 4 > pipe.x && bird.x + 4 < pipe.x + pipeWidth) {
                        // Üst boruya veya alt boruya çarptı mı?
                        if (bird.y + 4 < pipe.topHeight || bird.y + bird.h - 4 > pipe.bottomY) {
                            gameOver = true;
                        }
                    }

                    // Puan Kazanma
                    if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
                        pipe.passed = true;
                        score++;
                        scoreUi.textContent = score;
                        if (score % 5 === 0) pipeSpeed += 0.2; // Oyun kademeli hızlanır
                    }

                    // Ekrandan çıkan boruları sil
                    if (pipe.x + pipeWidth < 0) pipes.splice(idx, 1);
                });

                // Tavan ve Taban Sınır Kontrolü
                if (bird.y + bird.h >= canvas.height - groundHeight) {
                    bird.y = canvas.height - groundHeight - bird.h;
                    gameOver = true;
                }
                if (bird.y < 0) bird.y = 0;
            }

            draw();
            requestAnimationFrame(update);
        }

        function drawBird(x, y) {
            ctx.save();
            ctx.translate(x + bird.w / 2, y + bird.h / 2);
            ctx.rotate(bird.rotation);

            // 1. KUŞUN GÖVDESİ (Sarı Piksel Blokları)
            ctx.fillStyle = "#F7D51D"; 
            ctx.fillRect(-bird.w/2, -bird.h/2, bird.w, bird.h);

            // Dış Siyah Kenarlık Konturu
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#000";
            ctx.strokeRect(-bird.w/2, -bird.h/2, bird.w, bird.h);

            // 2. KOCAMAN GÖZ
            ctx.fillStyle = "#FFF";
            ctx.fillRect(4, -8, 10, 10);
            ctx.fillStyle = "#000"; // Göz bebeği
            ctx.fillRect(10, -6, 4, 4);

            // 3. TURUNCU GAGA
            ctx.fillStyle = "#F75300";
            ctx.fillRect(8, 2, 10, 8);
            ctx.strokeRect(8, 2, 10, 8);

            // 4. KANAT ÇIRPIŞ PİKSEL SİSTEMİ (wingFrame durumuna göre şekil değiştirir)
            ctx.fillStyle = "#FFF";
            ctx.strokeStyle = "#000";
            if (bird.wingFrame === 0) {
                // Kanat Yukarıda
                ctx.fillRect(-14, -12, 12, 10);
                ctx.strokeRect(-14, -12, 12, 10);
            } else if (bird.wingFrame === 1) {
                // Kanat Ortada süzülüyor
                ctx.fillRect(-14, -4, 12, 8);
                ctx.strokeRect(-14, -4, 12, 8);
            } else {
                // Kanat Aşağıda
                ctx.fillRect(-14, 2, 12, 10);
                ctx.strokeRect(-14, 2, 12, 10);
            }

            ctx.restore();
        }

        function draw() {
            // ARKA PLAN (Gökyüzü Mavisi)
            ctx.fillStyle = "#4ec0ca";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Arka Plan Şehir Detayları (Açık Yeşil Tepeler)
            ctx.fillStyle = "#7ec873";
            ctx.fillRect(0, canvas.height - groundHeight - 40, canvas.width, 40);

            // BORULARI ÇİZ (Klasik Flappy Yeşili ve Gölgeleri)
            pipes.forEach(pipe => {
                // Üst Boru
                ctx.fillStyle = "#73bf2e";
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.strokeStyle = "#558022";
                ctx.lineWidth = 3;
                ctx.strokeRect(pipe.x, -5, pipeWidth, pipe.topHeight + 5);
                // Üst Borunun Ağzı
                ctx.fillStyle = "#9ce659";
                ctx.fillRect(pipe.x - 4, pipe.topHeight - 24, pipeWidth + 8, 24);
                ctx.strokeRect(pipe.x - 4, pipe.topHeight - 24, pipeWidth + 8, 24);

                // Alt Boru
                ctx.fillStyle = "#73bf2e";
                ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);
                ctx.strokeRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY + 5);
                // Alt Borunun Ağzı
                ctx.fillStyle = "#9ce659";
                ctx.fillRect(pipe.x - 4, pipe.bottomY, pipeWidth + 8, 24);
                ctx.strokeRect(pipe.x - 4, pipe.bottomY, pipeWidth + 8, 24);
            });

            // ZEMİN (Toprak ve Çimen Alanı)
            ctx.fillStyle = "#d4a359"; // Toprak
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            ctx.fillStyle = "#54b03c"; // Çimen çizgisi
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 14);
            ctx.fillStyle = "#fff"; // Çimen altındaki beyaz şerit detayı
            ctx.fillRect(0, canvas.height - groundHeight + 14, canvas.width, 3);

            // KUŞU ÇİZ
            drawBird(bird.x, bird.y);

            // OYUN BAŞLAMADIYSA VEYA BİTTİYSE MESAJ VER
            if (!gameStarted) {
                ctx.fillStyle = "white";
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("UÇMAK İÇİN DOKUN", canvas.width / 2, canvas.height / 2 + 80);
            }

            if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "#e74c3c";
                ctx.font = "40px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = "white";
                ctx.font = "20px sans-serif";
                ctx.fillText("Yeniden Başlamak İçin Dokun", canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        update();
    </script>
</body>
</html>
