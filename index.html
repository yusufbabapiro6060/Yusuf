
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mily Flappy Fix</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #70c5ce; font-family: Arial; overflow: hidden; }
        #game-container { position: relative; width: 320px; height: 480px; background-color: #70c5ce; overflow: hidden; border: 3px solid #000; touch-action: none; }
        #bird { position: absolute; width: 34px; height: 24px; background-color: #ffcc00; border-radius: 12px; left: 50px; top: 200px; z-index: 10; border: 2px solid #000; }
        .pipe { position: absolute; width: 50px; background-color: #4CAF50; border: 2px solid #2E7D32; right: -60px; z-index: 5; }
        #score { position: absolute; top: 10px; left: 10px; font-size: 24px; font-weight: bold; color: white; z-index: 20; text-shadow: 2px 2px #000; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; }
        #restart-btn { padding: 15px 30px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px #27ae60; }
        #restart-btn:active { box-shadow: none; transform: translateY(4px); }
    </style>
</head>
<body>

<div id="game-container" id="tap-area">
    <div id="score">0</div>
    <div id="bird"></div>
    <div id="game-over">
        <h1>BİTTİ!</h1>
        <p id="final-txt">Skor: 0</p>
        <button id="restart-btn">TEKRAR DENE</button>
    </div>
</div>

<script>
    const bird = document.getElementById('bird');
    const container = document.getElementById('game-container');
    const scoreDisp = document.getElementById('score');
    const screenOver = document.getElementById('game-over');
    const btn = document.getElementById('restart-btn');

    let bY = 200, bV = 0, gravity = 0.2, jump = -4.5;
    let score = 0, active = true, pipes = [], frame = 0;

    function reset() {
        bY = 200; bV = 0; score = 0; pipes.forEach(p => p.el.remove());
        pipes = []; active = true; frame = 0;
        scoreDisp.textContent = '0';
        screenOver.style.display = 'none';
        loop();
    }

    function spawnPipe() {
        const gap = 140; // Boru arası boşluk (Genişletildi)
        const minH = 50;
        const topH = Math.random() * (container.clientHeight - gap - 100) + minH;
        
        const topEl = document.createElement('div');
        topEl.className = 'pipe';
        topEl.style.height = topH + 'px';
        topEl.style.top = '0';
        container.appendChild(topEl);

        const botEl = document.createElement('div');
        botEl.className = 'pipe';
        botEl.style.height = (container.clientHeight - topH - gap) + 'px';
        botEl.style.bottom = '0';
        container.appendChild(botEl);

        pipes.push({ x: 320, top: topEl, bot: botEl, upperLimit: topH, lowerLimit: topH + gap, passed: false });
    }

    function loop() {
        if (!active) return;
        frame++;
        bV += gravity;
        bY += bV;
        bird.style.top = bY + 'px';
        bird.style.transform = `rotate(${Math.min(bV * 4, 90)}deg)`;

        if (frame % 100 === 0) spawnPipe(); // Boru gelme sıklığı azaltıldı

        for (let i = pipes.length - 1; i >= 0; i--) {
            let p = pipes[i];
            p.x -= 2.5;
