<!DOCTYPE html>
<html>
<head>
    <title>Çakma Flappy</title>
    <style>
        body { margin: 0; overflow: hidden; background: skyblue; text-align: center; }
        canvas { background: white; border: 2px solid #000; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="game" width="320" height="480"></canvas>
    <script>
        var canvas = document.getElementById("game");
        var ctx = canvas.getContext("2d");
        var birdY = 200, birdV = 0;
        
        // Ekrana dokununca zıpla
        window.onclick = function() { birdV = -5; };

        function loop() {
            birdV += 0.25; birdY += birdV; // Yerçekimi
            ctx.clearRect(0,0,320,480);
            ctx.fillStyle = "orange";
            ctx.fillRect(50, birdY, 30, 30); // Kuş
            
            if(birdY > 450) birdY = 200; // Düşerse başa sar
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
